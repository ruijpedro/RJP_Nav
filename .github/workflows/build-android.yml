name: Build RJP Navigator Android APK V3.1.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          node --version
          yarn --version

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Verify tools
        run: |
          yarn vite --version
          yarn cap --version

      - name: Build WebApp
        run: yarn build

      - name: Create Android project
        run: |
          if [ ! -d android ]; then
            yarn cap add android
          fi
          yarn cap sync android
          echo "Plugins nativos configurados:"
          cat android/capacitor.settings.gradle || true
          if grep -R "capacitor-geolocation" android/capacitor.settings.gradle android/app/capacitor.build.gradle 2>/dev/null; then
            echo "ERRO: referência antiga ao capacitor-geolocation encontrada."
            exit 1
          fi

      - name: Apply Android permissions and icons
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          xml = manifest.read_text(encoding="utf-8")

          permissions = [
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
          ]

          # Insert permissions immediately after the opening <manifest ...> tag.
          # Never insert after the XML declaration, which would make the file invalid.
          match = re.search(r'<manifest\b[^>]*>', xml, flags=re.DOTALL)
          if not match:
              raise SystemExit("ERRO: tag <manifest> não encontrada")

          missing = [permission for permission in permissions if permission not in xml]
          if missing:
              block = "\n    " + "\n    ".join(missing)
              xml = xml[:match.end()] + block + xml[match.end():]

          manifest.write_text(xml, encoding="utf-8")
          PY

          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          ET.parse(manifest)
          print("AndroidManifest.xml válido")
          PY

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android/app/src/main/res/mipmap-$density"
            cp "android-res/mipmap-$density/ic_launcher.png" "android/app/src/main/res/mipmap-$density/ic_launcher.png"
            cp "android-res/mipmap-$density/ic_launcher.png" "android/app/src/main/res/mipmap-$density/ic_launcher_round.png"
            cp "android-res/mipmap-$density/ic_launcher_adaptive_back.png" "android/app/src/main/res/mipmap-$density/ic_launcher_adaptive_back.png"
            cp "android-res/mipmap-$density/ic_launcher_adaptive_fore.png" "android/app/src/main/res/mipmap-$density/ic_launcher_adaptive_fore.png"
          done

          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@mipmap/ic_launcher_adaptive_back"/>
            <foreground android:drawable="@mipmap/ic_launcher_adaptive_fore"/>
          </adaptive-icon>
          XML
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_V3_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
