name: Build RJP Navigator Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          npm install --include=dev --legacy-peer-deps --no-audit --no-fund
          npm ls vite @vitejs/plugin-react @capacitor/cli @capacitor/android @capacitor/geolocation
          test -x node_modules/.bin/vite
          test -x node_modules/.bin/cap

      - name: Build WebApp
        run: npx --no-install vite build

      - name: Create Android project
        run: |
          if [ ! -d android ]; then
            npx --no-install cap add android
          fi
          npx --no-install cap sync android

      - name: Apply Android permissions and icons
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text(encoding="utf-8")
          permissions = [
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />'
          ]
          insert_at = s.find('>') + 1
          for permission in reversed(permissions):
              if permission not in s:
                  s = s[:insert_at] + "\n    " + permission + s[insert_at:]
          p.write_text(s, encoding="utf-8")
          PY

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android/app/src/main/res/mipmap-$density"
            cp "android-res/mipmap-$density/ic_launcher.png" "android/app/src/main/res/mipmap-$density/ic_launcher.png"
            cp "android-res/mipmap-$density/ic_launcher.png" "android/app/src/main/res/mipmap-$density/ic_launcher_round.png"
            cp "android-res/mipmap-$density/ic_launcher_adaptive_back.png" "android/app/src/main/res/mipmap-$density/ic_launcher_adaptive_back.png"
            cp "android-res/mipmap-$density/ic_launcher_adaptive_fore.png" "android/app/src/main/res/mipmap-$density/ic_launcher_adaptive_fore.png"
          done

          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@mipmap/ic_launcher_adaptive_back"/>
            <foreground android:drawable="@mipmap/ic_launcher_adaptive_fore"/>
          </adaptive-icon>
          XML
          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_V3_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
