name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Verify Vite
        run: ./node_modules/.bin/vite --version

      - name: Build WebApp
        run: npm run build

      - name: Upload WebApp
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
          if-no-files-found: error
