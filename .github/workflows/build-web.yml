name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          node --version
          yarn --version

      - name: Install dependencies
        run: yarn install --no-immutable

      - name: Verify Vite
        run: yarn vite --version

      - name: Build WebApp
        run: yarn build

      - name: Upload WebApp
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
          if-no-files-found: error
