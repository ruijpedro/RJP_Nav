name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Use stable npm
        run: |
          npm install -g npm@10.9.2
          npm --version
          node --version

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm cache clean --force
          npm ci --include=dev --no-audit --no-fund --legacy-peer-deps

      - name: Verify Vite
        run: |
          test -x node_modules/.bin/vite
          node_modules/.bin/vite --version

      - name: Build WebApp
        run: npm run build

      - name: Upload WebApp
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
