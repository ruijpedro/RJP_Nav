name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean previous install
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund --legacy-peer-deps

      - name: Verify Vite
        run: |
          node -e "console.log(require('./node_modules/vite/package.json').version)"
          ./node_modules/.bin/vite --version

      - name: Build WebApp
        run: ./node_modules/.bin/vite build

      - uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
