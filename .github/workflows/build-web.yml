name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          npm install --include=dev --legacy-peer-deps --no-audit --no-fund
          npm ls vite @vitejs/plugin-react react react-dom
          test -x node_modules/.bin/vite

      - name: Build WebApp
        run: npx --no-install vite build

      - name: Upload WebApp
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
          if-no-files-found: error
